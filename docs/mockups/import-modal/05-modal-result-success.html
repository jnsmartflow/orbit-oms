<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>05 — Import modal · result success</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
</style>
</head>
<body class="m-0">

<div style="min-height: 700px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; padding: 40px 20px;">

  <div class="w-[520px] bg-white rounded-lg shadow-xl flex flex-col">

    <!-- Header bar -->
    <div class="flex items-center justify-between px-5 py-3 border-b border-gray-200">
      <div class="text-[13px] font-semibold text-gray-900">Import OBDs</div>
      <button class="text-gray-400 hover:text-gray-600 cursor-pointer">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Body -->
    <div class="px-8 py-8 flex flex-col items-center text-center">

      <!-- Green check -->
      <div class="w-12 h-12 rounded-full bg-green-50 border border-green-200 flex items-center justify-center mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-green-600"><polyline points="20 6 9 17 4 12"/></svg>
      </div>

      <!-- Heading -->
      <h2 class="text-[14px] font-semibold text-gray-900 mb-1">Import Complete</h2>

      <!-- Batch ref chip -->
      <span class="inline-flex items-center gap-1 bg-gray-100 rounded-[5px] px-2.5 py-1 text-[11px] font-mono text-gray-700 mb-5">
        BATCH-20260504-001
      </span>

      <!-- 2x2 grid -->
      <div class="grid grid-cols-2 gap-2 w-full mb-5">
        <div class="bg-gray-50 border border-gray-200 rounded-[5px] px-3 py-2.5">
          <div class="text-[10px] uppercase tracking-wider text-gray-400 font-medium">Created</div>
          <div class="text-[18px] font-semibold text-gray-900 tabular-nums">0</div>
        </div>
        <div class="bg-amber-50 border border-amber-200 rounded-[5px] px-3 py-2.5">
          <div class="text-[10px] uppercase tracking-wider text-amber-700 font-medium">Patched</div>
          <div class="text-[18px] font-semibold text-amber-700 tabular-nums">5</div>
        </div>
        <div class="bg-gray-50 border border-gray-200 rounded-[5px] px-3 py-2.5">
          <div class="text-[10px] uppercase tracking-wider text-gray-400 font-medium">Unchanged</div>
          <div class="text-[18px] font-semibold text-gray-900 tabular-nums">154</div>
        </div>
        <div class="bg-gray-50 border border-gray-200 rounded-[5px] px-3 py-2.5">
          <div class="text-[10px] uppercase tracking-wider text-gray-400 font-medium">Errored</div>
          <div class="text-[18px] font-semibold text-gray-900 tabular-nums">0</div>
        </div>
      </div>

      <!-- Inline action links -->
      <div class="flex items-center gap-3">
        <button class="text-[11px] text-gray-600 hover:text-gray-900 underline-offset-2 hover:underline cursor-pointer flex items-center gap-1">
          View Audit
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </button>
        <span class="text-gray-300">·</span>
        <button class="text-[11px] text-gray-600 hover:text-gray-900 underline-offset-2 hover:underline cursor-pointer">Import Another File</button>
      </div>

    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-2 px-5 py-3 border-t border-gray-200">
      <button class="text-[11px] bg-gray-900 hover:bg-gray-800 text-white font-medium rounded-[5px] px-4 py-1.5 cursor-pointer">Done</button>
    </div>
  </div>

</div>
</body>
</html>
